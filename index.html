<!DOCTYPE html>
<html lang="id">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Login</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

<div class="container">

    <div class="logo">
        <h1>TASKFLOW</h1>
        <p>Kelola tugas dan capai tujuan</p>
    </div>

    <form id="loginForm">

        <div class="input-group">
            <label>Email</label>
            <input
            type="email"
            id="loginEmail"
            placeholder="Email anda"
            required
            >
        </div>

       <div class="input-group">

    <label>Password</label>

    <div class="password-box">

        <input
            type="password"
            id="loginPassword"
            placeholder="Password anda"
            required
        >

        <i class="fa-solid fa-eye" id="toggleLoginPassword"></i>

    </div>

</div>

        <div class="option">

            <div class="remember">
                <input type="checkbox" id="ingat">
                <label for="ingat">Ingat saya</label>
            </div>

            <a href="lupapassword.html">Lupa Password?</a>

        </div>

        <button type="submit">
            Masuk
        </button>

    </form>

    <div class="register">
        Belum punya akun?
        <a href="register.html">Daftar sekarang</a>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>

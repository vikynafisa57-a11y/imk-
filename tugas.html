<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Tugas</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="phone">

    <!-- Header -->
    <header>
        <h2>Tugas Saya</h2>

        <a href="setting.html" class="filter">
            <i class="fa-solid fa-gear"></i>
        </a>
    </header>

    <!-- Search -->
    <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Cari tugas...">
    </div>

    <!-- Kategori -->

    <div class="kategori">
        <button id="btnSemua" class="aktif">Semua</button>
        <button id="btnHariIni">Hari Ini</button>
        <button id="btnSelesai">Selesai</button>
    </div>

    <!-- Daftar Tugas (otomatis diisi oleh script.js) -->

    <div class="task-list" id="taskList">

        <!-- Akan diisi otomatis oleh script.js -->

    </div>

    <!-- Floating Button -->

    <a href="tambah.html" class="add-btn">
        <i class="fa-solid fa-plus"></i>
    </a>

    <!-- Bottom Menu -->

        <nav>

        <a href="dashboard.html">
            <i class="fa-solid fa-house"></i>
            <span>Dashboard</span>
        </a>

        <a href="tugas.html" class="active">
            <i class="fa-solid fa-list-check"></i>
            <span>Tugas</span>
        </a>

        <a href="proyek.html">
            <i class="fa-solid fa-folder"></i>
            <span>Proyek</span>
        </a>

        <a href="calendar.html">
            <i class="fa-solid fa-calendar"></i>
            <span>Kalender</span>
        </a>

        <a href="profil.html">
            <i class="fa-solid fa-user"></i>
            <span>Profil</span>
        </a>

    </nav>


</div>
    <script src="script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Proyek</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>

<div class="task-page">

    <div class="task-header">
        <a href="proyek.html">
            <i class="fa-solid fa-arrow-left"></i>
        </a>

        <h2>Tambah Proyek</h2>
    </div>

    <form id="projectForm">

        <div class="form-group">
            <label>Judul Proyek</label>
            <input type="text" id="namaProyek" required>
        </div>

        <div class="form-group">
            <label>Deskripsi Proyek</label>
            <textarea id="deskripsiProyek"></textarea>
        </div>

        <div class="form-group">
            <label for="jenisProyek">Jenis Proyek</label>
            <select id="jenisProyek" required>
                <option value="">Pilih jenis proyek</option>
                <option value="Individu">Individu</option>
                <option value="Kelompok">Kelompok</option>
            </select>
        </div>

        <div class="form-group">
            <label for="penanggungProyek">Penanggung Jawab</label>
            <input type="text" id="penanggungProyek" placeholder="Ketik nama penanggung jawab" required>
        </div>

        <div class="form-group">
            <label for="deadlineProyek">Deadline Proyek</label>
            <input type="date" id="deadlineProyek" required>
        </div>

        <div class="form-group">
            <label>Progress Saat Ini (%)</label>
            <input type="number" id="progressProyek" min="0" max="100" value="0">
        </div>

        <div class="form-group">
            <label for="reminderProyek">Reminder</label>
            <select id="reminderProyek">
                <option value="">Tidak ada reminder</option>
                <option value="30menit">30 Menit sebelum deadline</option>
                <option value="1jam">1 Jam sebelum deadline</option>
                <option value="3jam">3 Jam sebelum deadline</option>
                <option value="12jam">12 Jam sebelum deadline</option>
                <option value="1hari">1 Hari sebelum deadline</option>
                <option value="2hari">2 Hari sebelum deadline</option>
            </select>
        </div>

        <div class="btn-group">
            <button type="button" class="btn-cancel" onclick="window.location.href='proyek.html'">
                Batal
            </button>

            <button type="submit" class="btn-save">
                Simpan
            </button>
        </div>

    </form>

</div>

<script src="script.js"></script>

</body>
</html>
